<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>Treino do Som S</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f1c40f;
            --bg: #f0f7ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg) url('img/background.jpg') no-repeat center;
            background-size: 150% auto;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            background: white;
            border-radius: 40px;
            padding: 70px 30px 30px;
            width: 90%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .rocket-container {
            flex: 1;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 3px solid #4a90e2;
            min-height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
        }

        .moon {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 80px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        .rocket {
            position: absolute;
            bottom: 40px;
            font-size: 50px;
            transition: left 0.6s ease-in-out;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .rocket-flame {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .explosion {
            position: absolute;
            font-size: 60px;
            animation: blast 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes blast {
            0% { 
                opacity: 1;
                transform: scale(0.8);
            }
            100% { 
                opacity: 0;
                transform: scale(1.5);
            }
        }

        .smoke {
            position: absolute;
            font-size: 40px;
            animation: smoke-rise 1.2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes smoke-rise {
            0% { 
                opacity: 1;
                transform: translateY(0) translateX(0);
            }
            100% { 
                opacity: 0;
                transform: translateY(-80px) translateX(var(--tx, 0));
            }
        }

        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #f1f1f1;
            border: none;
            padding: 10px 15px;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background 0.2s;
            z-index: 10;
        }

        .btn-back:hover {
            background: #e5e5e5;
        }

        .progress-container {
            background: #eee;
            border-radius: 20px;
            height: 15px;
            margin: 25px 0;
            overflow: hidden;
            border: 2px solid #eee;
        }

        #progress-bar {
            background: linear-gradient(90deg, var(--success), #58d68d);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }

        .emoji-display {
            font-size: 100px;
            margin: 20px 0;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .word-display {
            font-size: 48px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        #feedback {
            height: 60px;
            font-weight: bold;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }

        .circle-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 38px;
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-mic {
            background: var(--primary);
            box-shadow: 0 6px #2980b9;
        }

        .btn-mic:active {
            transform: translateY(4px);
            box-shadow: 0 2px #2980b9;
        }

        .btn-audio {
            background: var(--warning);
            box-shadow: 0 6px #d4ac0d;
        }

        .btn-audio:active {
            transform: translateY(4px);
            box-shadow: 0 2px #d4ac0d;
        }

        .listening {
            animation: pulse 1s infinite;
            background: var(--error) !important;
            box-shadow: 0 6px #c0392b !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
  🍽️          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        #victory-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            border-radius: 40px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .star-score {
            font-size: 1.2rem;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <a href="index.html" class="btn-back">⬅ Menu</a>
        
        <div class="rocket-container">
            <div class="moon">🌙</div>
            <div id="rocket" class="rocket">🚀</div>
            <div id="rocket-flame" class="rocket-flame">🔥</div>
            <div id="explosion-area"></div>
        </div>
        
        <div id="game-ui">
            <div id="counter" class="star-score" style="display: none;">Estrelas: 0 / 20</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div id="scores" class="star-score">Jogador: 0 | Pato: 0</div>
            
            <div id="emoji" class="emoji-display">🎲</div>
            <div id="word" class="word-display">...</div>
            <div id="feedback">Escolhe o som correto</div>

            <div class="controls">
                <button onclick="checkAnswer('S')" class="circle-btn" style="background: #4CAF50; box-shadow: 0 6px #388E3C;">🐍</button>
                <button onclick="checkAnswer('Z')" class="circle-btn" style="background: #FFD700; box-shadow: 0 6px #FBC02D; color: #333;">🐝</button>
                <button class="circle-btn btn-audio" onclick="playHelp()">🔊</button>
            </div>
        </div>

        <div id="victory-screen">
            <div style="font-size: 100px;" id="medal">🏆</div>
            <h2 style="color: var(--primary); font-size: 2rem;">INCRÍVEL!</h2>
            <p id="victory-text" style="color: #666; margin-bottom: 30px;"></p>
            <div id="ranking" style="color: #666; margin-bottom: 20px;"></div>
            <a href="index.html" style="background: var(--success); color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.2rem; box-shadow: 0 5px #27ae60;">Voltar ao Menu</a>
        </div>
    </div>

<script>
    // Banco de palavras focado no fonema S (Início, Meio e Fim)
    const rawWordBank = [
        {w: "Sapo", s: "S", e: "🐸"}, {w: "Sapato", s: "S", e: "👞"}, {w: "Saco", s: "S", e: "🛍️"}, {w: "Sabão", s: "S", e: "🧼"}, {w: "Salgado", s: "S", e: "🥨"},
        {w: "Seda", s: "S", e: "👗"}, {w: "Selo", s: "S", e: "✉️"}, {w: "Sereia", s: "S", e: "🧜‍♀️"}, {w: "Sexta", s: "S", e: "🧺"}, {w: "Sino", s: "S", e: "🔔"},
        {w: "Sopa", s: "S", e: "🥣"}, {w: "Sossego", s: "S", e: "🛌"}, {w: "Sol", s: "S", e: "☀️"}, {w: "Sumo", s: "S", e: "🥤"}, {w: "Saco", s: "S", e: "🎒"},
        {w: "Casa", s: "Z", e: "🏠"}, {w: "Massa", s: "Z", e: "🍝"}, {w: "Mesa", s: "Z", e: "🪑"}, {w: "Vaso", s: "Z", e: "🏺"}, {w: "Osso", s: "Z", e: "🦴"},
        {w: "Rosa", s: "Z", e: "🌹"}, {w: "Passo", s: "Z", e: "👣"}, {w: "Assado", s: "Z", e: "🍖"}, {w: "Vassoura", s: "Z", e: "🧹"}, {w: "Azeite", s: "Z", e: "🫙"},
        {w: "Buzina", s: "Z", e: "📢"}, {w: "Cozinha", s: "Z", e: "🍳"}, {w: "Dúzia", s: "Z", e: "🥚"}, {w: "Dezena", s: "Z", e: "🔟"}, {w: "Tesouro", s: "Z", e: "🏴‍☠️"},
        {w: "Amizade", s: "Z", e: "🤝"}, {w: "Beleza", s: "Z", e: "✨"}, {w: "Azul", s: "Z", e: "🟦"}, {w: "Arroz", s: "Z", e: "🍚"}, {w: "Vazio", s: "Z", e: "🕳️"},
        {w: "Batizado", s: "Z", e: "⛪"}, {w: "Zebra", s: "Z", e: "🦓"}, {w: "Zero", s: "Z", e: "0️⃣"}, {w: "Zorro", s: "Z", e: "🦊"}, {w: "Zangão", s: "Z", e: "🐝"}
    ];

    let sessionWords = [];
    let score = 0;
    let currentItem = {};
    let failures = 0;
    let rocketPosition = 0;
    let attempts = 0;

    function initGame() {
        sessionWords = [...rawWordBank.slice(0,20)].sort(() => Math.random() - 0.5);
        score = 0;
        failures = 0;
        rocketPosition = 0;
        attempts = 0;
        updateRocket();
        updateUI();
        nextWord();
    }

    function updateRocket() {
        const container = document.querySelector('.rocket-container');
        const width = container.offsetWidth - 100;
        const maxPos = 20;
        document.getElementById('rocket').style.left = `${20 + (rocketPosition / maxPos) * width}px`;
    }

    function showExplosion() {
        const rocket = document.getElementById('rocket');
        const explosionArea = document.getElementById('explosion-area');
        const rocketRect = rocket.getBoundingClientRect();
        const containerRect = document.querySelector('.rocket-container').getBoundingClientRect();
        
        // Blast effect
        const blast = document.createElement('div');
        blast.className = 'explosion';
        blast.textContent = '💥';
        blast.style.left = `${rocketRect.left - containerRect.left}px`;
        blast.style.top = `${rocketRect.top - containerRect.top}px`;
        explosionArea.appendChild(blast);
        
        // Multiple smoke puffs
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                const smoke = document.createElement('div');
                smoke.className = 'smoke';
                smoke.textContent = '💨';
                smoke.style.left = `${rocketRect.left - containerRect.left + (Math.random() - 0.5) * 30}px`;
                smoke.style.top = `${rocketRect.top - containerRect.top}px`;
                smoke.style.setProperty('--tx', `${(Math.random() - 0.5) * 60}px`);
                explosionArea.appendChild(smoke);
            }, i * 100);
        }
    }

    function checkAnswer(choice) {
        const correctAnswer = currentItem.s;
        attempts++;
        
        if (choice === correctAnswer) {
            score++;
            rocketPosition++;
            document.getElementById('feedback').innerText = "MUITO BEM! 🚀";
            document.getElementById('feedback').style.color = "var(--success)";
            updateRocket();
            updateUI();
            
            if (attempts >= 20) {
                setTimeout(() => {
                    document.getElementById('game-ui').style.display = 'none';
                    const medal = document.getElementById('medal');
                    const victoryText = document.getElementById('victory-text');
                    const ranking = document.getElementById('ranking');
                    
                    if (score >= 18) {
                        medal.innerText = '🌙';
                        victoryText.innerText = `Parabéns! Chegaste à lua com ${score} de 20 palavras!`;
                        ranking.innerHTML = `Foguete decolou com sucesso!`;
                    } else {
                        medal.innerText = '🌍';
                        victoryText.innerText = `Quase! Desceste na Terra com ${score} de 20 palavras.`;
                        ranking.innerHTML = `Treina mais para chegar à lua!`;
                    }
                    
                    document.getElementById('victory-screen').style.display = 'flex';
                }, 1000);
            } else {
                setTimeout(nextWord, 1200);
            }
        } else {
            failures++;
            showExplosion();
            document.getElementById('feedback').innerText = `Errado! Tenta outra vez.`;
            document.getElementById('feedback').style.color = "var(--error)";
            
            if (attempts >= 20) {
                setTimeout(() => {
                    document.getElementById('game-ui').style.display = 'none';
                    const medal = document.getElementById('medal');
                    const victoryText = document.getElementById('victory-text');
                    const ranking = document.getElementById('ranking');
                    
                    if (score >= 18) {
                        medal.innerText = '🌙';
                        victoryText.innerText = `Parabéns! Chegaste à lua com ${score} de 20 palavras!`;
                        ranking.innerHTML = `Foguete decolou com sucesso!`;
                    } else {
                        medal.innerText = '🌍';
                        victoryText.innerText = `Quase! Desceste na Terra com ${score} de 20 palavras.`;
                        ranking.innerHTML = `Treina mais para chegar à lua!`;
                    }
                    
                    document.getElementById('victory-screen').style.display = 'flex';
                }, 1000);
            } else {
                setTimeout(nextWord, 800);
            }
        }
    }

    function nextWord() {
        if (sessionWords.length === 0) {
            sessionWords = [...rawWordBank].sort(() => Math.random() - 0.5);
        }
        currentItem = sessionWords.shift();
        document.getElementById('word').innerText = currentItem.w;
        document.getElementById('emoji').innerText = currentItem.e;
        document.getElementById('feedback').innerText = "Escolhe o som correto";
        document.getElementById('feedback').style.color = "#7f8c8d";
    }

    function updateUI() {
        document.getElementById('counter').innerText = `Palavras: ${score} / 20`;
        document.getElementById('progress-bar').style.width = (score / 20 * 100) + "%";
        document.getElementById('scores').innerText = `Progresso: ${score} / 20`;
    }

    function playHelp() {
        const utter = new SpeechSynthesisUtterance(currentItem.w);
        utter.lang = 'pt-PT';
        utter.rate = 0.9;
        window.speechSynthesis.speak(utter);
    }

    window.onload = initGame;
</script>
</body>
</html>
